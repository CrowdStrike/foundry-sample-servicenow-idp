version: 2
updates:
  - package-ecosystem: pip
    directory: "/functions/servicenowToIdpPolicyRulesTransformer/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
      timezone: "UTC"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
      timezone: "UTC"
    ignore:
      - dependency-name: "actions/checkout"
        versions: [">=6.0.3"]
      - dependency-name: "actions/setup-node"
        versions: [">=6.3.0"]
      - dependency-name: "actions/setup-python"
        versions: [">=6.3.0"]
      - dependency-name: "actions/upload-artifact"
        versions: [">=7.0.0"]
